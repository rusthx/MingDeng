<div class="p-8">
    <!-- Header -->
    <div class="mb-8">
        <h2 class="text-3xl font-bold text-gray-900 dark:text-white mb-2">
            📚 资源库
        </h2>
        <p class="text-gray-600 dark:text-gray-400">保存和管理你的学习资源</p>
    </div>

    <!-- Add Resource -->
    <div class="bg-white dark:bg-gray-800 rounded-lg p-6 shadow-sm mb-6">
        <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">添加新资源</h3>

        <div class="space-y-3">
            <input
                type="text"
                id="resource-content"
                placeholder="资源链接或描述（例如：https://youtube.com/...）"
                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg dark:bg-gray-700 dark:text-white"
            >

            <input
                type="text"
                id="resource-description"
                placeholder="简短描述（例如：vLLM 入门教程）"
                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg dark:bg-gray-700 dark:text-white"
            >

            <div class="flex gap-3">
                <select
                    id="resource-type"
                    class="px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg dark:bg-gray-700 dark:text-white"
                >
                    <option value="video">📹 视频</option>
                    <option value="article">📄 文章</option>
                    <option value="paper">📑 论文</option>
                    <option value="other">📌 其他</option>
                </select>

                <button id="add-resource-btn" class="flex-1 px-6 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">
                    ➕ 添加资源
                </button>
            </div>
        </div>
    </div>

    <!-- Resource List -->
    <div class="bg-white dark:bg-gray-800 rounded-lg p-6 shadow-sm">
        <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">已保存的资源</h3>

        <div id="resources-list" class="space-y-3">
            <!-- Resources will be listed here -->
            <div class="text-center py-8 text-gray-500 dark:text-gray-400">
                暂无资源，添加你的第一个学习资源吧！
            </div>
        </div>
    </div>
</div>
