<div class="p-8">
    <!-- Header -->
    <div class="mb-8">
        <h2 class="text-3xl font-bold text-gray-900 dark:text-white mb-2">
            📋 生成学习计划
        </h2>
        <p class="text-gray-600 dark:text-gray-400">告诉 AI 你想学什么，它会帮你制定科学的学习计划</p>
    </div>

    <!-- Input Section -->
    <div class="bg-white dark:bg-gray-800 rounded-lg p-6 mb-6 shadow-sm">
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
            描述你的学习目标
        </label>
        <textarea
            id="learning-goals"
            rows="8"
            class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:text-white"
            placeholder="例如：
我想学习 Agentic RL，需要掌握：
- Python 异步编程
- vLLM 和 SGLang 基础
- Transformer 模型原理
- 强化学习基础（RLHF）
- TRL 和 VeRL 框架使用

我每天可以学习 2-3 小时，希望在 3-4 周内入门。"
        ></textarea>

        <div class="mt-4 flex gap-3 items-center">
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">开始日期</label>
                <input type="date" id="start-date" class="px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg dark:bg-gray-700 dark:text-white">
            </div>

            <button id="generate-plan-btn" class="mt-6 px-8 py-3 bg-blue-500 text-white rounded-lg hover:bg-blue-600 font-medium">
                🤖 生成计划
            </button>
        </div>
    </div>

    <!-- Generated Plan Preview -->
    <div id="plan-preview" class="hidden">
        <div class="bg-white dark:bg-gray-800 rounded-lg p-6 shadow-sm">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-gray-900 dark:text-white" id="plan-name">
                    学习计划
                </h3>
                <div class="flex gap-2">
                    <button id="save-plan-btn" class="px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600">
                        ✓ 保存计划
                    </button>
                    <button id="regenerate-plan-btn" class="px-4 py-2 bg-gray-300 dark:bg-gray-600 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-400">
                        🔄 重新生成
                    </button>
                </div>
            </div>

            <div id="plan-tasks-preview" class="space-y-2 max-h-96 overflow-y-auto">
                <!-- Tasks will be listed here -->
            </div>
        </div>
    </div>

    <!-- Loading State -->
    <div id="generating-state" class="hidden text-center py-12">
        <div class="animate-spin text-6xl mb-4">🔄</div>
        <h3 class="text-xl font-semibold text-gray-700 dark:text-gray-300 mb-2">AI 正在生成你的学习计划...</h3>
        <p class="text-gray-500 dark:text-gray-400">这可能需要几秒钟</p>
    </div>

    <!-- Existing Plans -->
    <div class="mt-12">
        <h3 class="text-2xl font-bold text-gray-900 dark:text-white mb-4">已有计划</h3>
        <div id="existing-plans" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Plans will be listed here -->
        </div>
    </div>
</div>
