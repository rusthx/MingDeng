<div class="p-8">
    <!-- Header -->
    <div class="mb-8">
        <h2 class="text-3xl font-bold text-gray-900 dark:text-white mb-2">
            ⚙️ 设置
        </h2>
        <p class="text-gray-600 dark:text-gray-400">配置你的 AI 助手</p>
    </div>

    <!-- API Configuration -->
    <div class="bg-white dark:bg-gray-800 rounded-lg p-6 shadow-sm mb-6">
        <h3 class="text-xl font-bold text-gray-900 dark:text-white mb-4">API 配置</h3>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
                    API Base URL
                </label>
                <input
                    type="text"
                    id="api-base-url"
                    placeholder="https://api.openai.com/v1"
                    class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg dark:bg-gray-700 dark:text-white"
                >
                <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">
                    支持 OpenAI、DeepSeek、Ollama 等兼容 OpenAI API 的服务
                </p>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
                    API Key
                </label>
                <input
                    type="password"
                    id="api-key"
                    placeholder="sk-..."
                    class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg dark:bg-gray-700 dark:text-white"
                >
                <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">
                    你的 API Key 仅存储在本地，不会上传
                </p>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
                    模型名称
                </label>
                <input
                    type="text"
                    id="api-model"
                    placeholder="gpt-4"
                    class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg dark:bg-gray-700 dark:text-white"
                >
                <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">
                    例如：gpt-4, gpt-3.5-turbo, deepseek-chat, qwen-plus
                </p>
            </div>
        </div>

        <button id="save-api-config" class="mt-4 px-6 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">
            保存 API 配置
        </button>

        <div id="config-status" class="mt-3 text-sm hidden"></div>
    </div>

    <!-- User Configuration -->
    <div class="bg-white dark:bg-gray-800 rounded-lg p-6 shadow-sm mb-6">
        <h3 class="text-xl font-bold text-gray-900 dark:text-white mb-4">用户设置</h3>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
                    用户名
                </label>
                <input
                    type="text"
                    id="user-name"
                    placeholder="你的名字"
                    class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg dark:bg-gray-700 dark:text-white"
                >
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
                    时区
                </label>
                <select
                    id="user-timezone"
                    class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg dark:bg-gray-700 dark:text-white"
                >
                    <option value="Asia/Shanghai">Asia/Shanghai (中国)</option>
                    <option value="America/New_York">America/New_York</option>
                    <option value="Europe/London">Europe/London</option>
                    <option value="Asia/Tokyo">Asia/Tokyo</option>
                </select>
            </div>
        </div>

        <button id="save-user-config" class="mt-4 px-6 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">
            保存用户设置
        </button>
    </div>

    <!-- Backup Management -->
    <div class="bg-white dark:bg-gray-800 rounded-lg p-6 shadow-sm">
        <h3 class="text-xl font-bold text-gray-900 dark:text-white mb-4">数据管理</h3>

        <div class="space-y-3">
            <button id="create-backup" class="w-full px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600">
                💾 创建备份
            </button>

            <button id="view-backups" class="w-full px-4 py-2 bg-gray-300 dark:bg-gray-600 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-400">
                📦 查看备份列表
            </button>

            <button id="clear-memory" class="w-full px-4 py-2 bg-yellow-500 text-white rounded-lg hover:bg-yellow-600">
                🧹 清除 AI 记忆
            </button>
        </div>
    </div>

    <!-- About -->
    <div class="mt-6 text-center text-sm text-gray-500 dark:text-gray-400">
        <p>MingDeng v0.1.0</p>
        <p class="mt-1">开源学习助手 · MIT License</p>
    </div>
</div>
