<div class="p-8">
    <!-- Header -->
    <div class="mb-8">
        <h2 class="text-3xl font-bold text-gray-900 dark:text-white mb-2">
            📊 学习统计
        </h2>
        <p class="text-gray-600 dark:text-gray-400">追踪你的学习进度和成就</p>
    </div>

    <!-- Stats Cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <!-- Total Tasks -->
        <div class="bg-white dark:bg-gray-800 rounded-lg p-6 shadow-sm">
            <div class="text-gray-500 dark:text-gray-400 text-sm mb-1">总任务数</div>
            <div class="text-3xl font-bold text-gray-900 dark:text-white" id="stat-total">0</div>
        </div>

        <!-- Completed Tasks -->
        <div class="bg-white dark:bg-gray-800 rounded-lg p-6 shadow-sm">
            <div class="text-gray-500 dark:text-gray-400 text-sm mb-1">已完成</div>
            <div class="text-3xl font-bold text-green-500" id="stat-completed">0</div>
        </div>

        <!-- Completion Rate -->
        <div class="bg-white dark:bg-gray-800 rounded-lg p-6 shadow-sm">
            <div class="text-gray-500 dark:text-gray-400 text-sm mb-1">完成率</div>
            <div class="text-3xl font-bold text-blue-500" id="stat-rate">0%</div>
        </div>
    </div>

    <!-- By Difficulty -->
    <div class="bg-white dark:bg-gray-800 rounded-lg p-6 shadow-sm mb-8">
        <h3 class="text-xl font-bold text-gray-900 dark:text-white mb-4">按难度分类</h3>
        <div class="space-y-4">
            <!-- Simple -->
            <div>
                <div class="flex justify-between text-sm mb-1">
                    <span class="text-gray-700 dark:text-gray-300">🟢 简单</span>
                    <span class="text-gray-500 dark:text-gray-400">
                        <span id="difficulty-simple-completed">0</span> / <span id="difficulty-simple-total">0</span>
                    </span>
                </div>
                <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2">
                    <div id="difficulty-simple-bar" class="bg-green-500 h-2 rounded-full" style="width: 0%"></div>
                </div>
            </div>

            <!-- Medium -->
            <div>
                <div class="flex justify-between text-sm mb-1">
                    <span class="text-gray-700 dark:text-gray-300">🟡 中等</span>
                    <span class="text-gray-500 dark:text-gray-400">
                        <span id="difficulty-medium-completed">0</span> / <span id="difficulty-medium-total">0</span>
                    </span>
                </div>
                <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2">
                    <div id="difficulty-medium-bar" class="bg-yellow-500 h-2 rounded-full" style="width: 0%"></div>
                </div>
            </div>

            <!-- Hard -->
            <div>
                <div class="flex justify-between text-sm mb-1">
                    <span class="text-gray-700 dark:text-gray-300">🔴 困难</span>
                    <span class="text-gray-500 dark:text-gray-400">
                        <span id="difficulty-hard-completed">0</span> / <span id="difficulty-hard-total">0</span>
                    </span>
                </div>
                <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2">
                    <div id="difficulty-hard-bar" class="bg-red-500 h-2 rounded-full" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- AI Summary (Future Feature) -->
    <div class="bg-gradient-to-r from-blue-500 to-purple-500 rounded-lg p-6 text-white shadow-sm">
        <h3 class="text-xl font-bold mb-2">💡 AI 学习总结</h3>
        <p class="text-blue-100" id="ai-summary">
            继续保持！你正在稳步前进。建议在完成更多任务后，适当休息并回顾已学内容。
        </p>
    </div>
</div>
