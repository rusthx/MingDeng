<div class="p-8">
    <!-- Header -->
    <div class="mb-8">
        <h2 class="text-3xl font-bold text-gray-900 dark:text-white mb-2" id="today-date">
            📅 今日任务
        </h2>
        <p class="text-gray-600 dark:text-gray-400">专注完成今天的学习任务</p>
    </div>

    <!-- Quick Actions -->
    <div class="mb-6 flex gap-3">
        <button id="refresh-tasks" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">
            🔄 刷新
        </button>
        <button id="add-task-btn" class="px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600">
            ➕ 快速添加任务
        </button>
    </div>

    <!-- Tasks Container -->
    <div id="tasks-container" class="space-y-4">
        <!-- Loading -->
        <div class="text-center py-12 text-gray-500 dark:text-gray-400">
            加载中...
        </div>
    </div>

    <!-- Empty State -->
    <div id="empty-state" class="hidden text-center py-12">
        <div class="text-6xl mb-4">🎉</div>
        <h3 class="text-xl font-semibold text-gray-700 dark:text-gray-300 mb-2">今天没有任务</h3>
        <p class="text-gray-500 dark:text-gray-400 mb-4">休息一下，或者创建一个新的学习计划吧！</p>
        <button class="px-6 py-3 bg-blue-500 text-white rounded-lg hover:bg-blue-600" onclick="navigateToPage('plan')">
            生成学习计划
        </button>
    </div>
</div>

<!-- Add Task Modal -->
<div id="add-task-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
    <div class="bg-white dark:bg-gray-800 rounded-lg p-6 w-full max-w-md">
        <h3 class="text-xl font-bold text-gray-900 dark:text-white mb-4">添加任务</h3>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">任务描述</label>
                <input type="text" id="new-task-title" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg dark:bg-gray-700 dark:text-white" placeholder="例如：学习 Python 基础">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">日期</label>
                <input type="date" id="new-task-date" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg dark:bg-gray-700 dark:text-white">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">预计时长（分钟）</label>
                <input type="number" id="new-task-time" value="60" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg dark:bg-gray-700 dark:text-white">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">难度</label>
                <select id="new-task-difficulty" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg dark:bg-gray-700 dark:text-white">
                    <option value="simple">🟢 简单</option>
                    <option value="medium" selected>🟡 中等</option>
                    <option value="hard">🔴 困难</option>
                </select>
            </div>
        </div>

        <div class="mt-6 flex gap-3">
            <button id="save-task-btn" class="flex-1 px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">
                保存
            </button>
            <button id="cancel-task-btn" class="px-4 py-2 bg-gray-300 dark:bg-gray-600 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-400 dark:hover:bg-gray-500">
                取消
            </button>
        </div>
    </div>
</div>
