<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MingDeng - 明灯学习助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col">
            <!-- Logo -->
            <div class="p-6 border-b border-gray-200 dark:border-gray-700">
                <h1 class="text-2xl font-bold text-gray-900 dark:text-white flex items-center gap-2">
                    <span>🏮</span>
                    <span>MingDeng</span>
                </h1>
                <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">在学习的黑暗中，为你照亮前路</p>
            </div>

            <!-- Navigation -->
            <nav class="flex-1 p-4 space-y-2">
                <a href="#" data-page="calendar" class="nav-link active">
                    <span class="icon">📅</span>
                    <span>学习日历</span>
                </a>
                <a href="#" data-page="today" class="nav-link">
                    <span class="icon">✅</span>
                    <span>今日任务</span>
                </a>
                <a href="#" data-page="plan" class="nav-link">
                    <span class="icon">📋</span>
                    <span>生成计划</span>
                </a>
                <a href="#" data-page="library" class="nav-link">
                    <span class="icon">📚</span>
                    <span>资源库</span>
                </a>
                <a href="#" data-page="stats" class="nav-link">
                    <span class="icon">📊</span>
                    <span>学习统计</span>
                </a>
                <a href="#" data-page="settings" class="nav-link">
                    <span class="icon">⚙️</span>
                    <span>设置</span>
                </a>
            </nav>

            <!-- Footer -->
            <div class="p-4 border-t border-gray-200 dark:border-gray-700">
                <button id="backup-btn" class="w-full px-4 py-2 text-sm bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600">
                    💾 创建备份
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <!-- Page Container -->
            <div id="page-container" class="flex-1 overflow-y-auto">
                <!-- Pages will be loaded here -->
            </div>
        </main>

        <!-- AI Chat Widget (Floating) -->
        <div id="chat-widget" class="hidden">
            <div class="fixed bottom-6 right-6 w-96 h-[500px] bg-white dark:bg-gray-800 rounded-lg shadow-2xl border border-gray-200 dark:border-gray-700 flex flex-col">
                <!-- Chat Header -->
                <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
                    <h3 class="font-semibold text-gray-900 dark:text-white flex items-center gap-2">
                        <span>🤖</span>
                        <span>AI 助手</span>
                    </h3>
                    <button id="chat-close" class="text-gray-500 hover:text-gray-700 dark:hover:text-gray-300">
                        ✕
                    </button>
                </div>

                <!-- Chat Messages -->
                <div id="chat-messages" class="flex-1 p-4 overflow-y-auto space-y-3">
                    <div class="text-center text-gray-500 dark:text-gray-400 text-sm">
                        你好！我是 MingDeng AI 助手，有什么可以帮你的吗？
                    </div>
                </div>

                <!-- Chat Input -->
                <div class="p-4 border-t border-gray-200 dark:border-gray-700">
                    <div class="flex gap-2">
                        <input
                            type="text"
                            id="chat-input"
                            placeholder="输入消息..."
                            class="flex-1 px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:text-white"
                        >
                        <button id="chat-send" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">
                            发送
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chat Toggle Button -->
        <button id="chat-toggle" class="fixed bottom-6 right-6 w-14 h-14 bg-blue-500 text-white rounded-full shadow-lg hover:bg-blue-600 flex items-center justify-center text-2xl">
            💬
        </button>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-6 right-6 px-6 py-3 bg-gray-800 text-white rounded-lg shadow-lg hidden">
        <span id="toast-message"></span>
    </div>

    <script src="main.js"></script>
</body>
</html>
