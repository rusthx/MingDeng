name: CI (PR Check)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ----------------- Python 后端检查 -----------------
  lint-python:
    name: Python后端代码检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install lint tools
        run: pip install ruff mypy

      - name: Run Ruff
        working-directory: ./backend
        run: ruff check .

      - name: Run Mypy
        working-directory: ./backend
        run: mypy . || true

  # ----------------- Rust (Tauri 核心) 检查 -----------------
  check-rust:
    name: Rust代码审查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # 先跑格式检查，失败时不用装系统依赖即可快速退出
      - name: Create dummy backend-venv for build check
        run: mkdir -p backend-venv

      - name: Check Formatting
        working-directory: ./src-tauri
        run: cargo fmt --check

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Run Clippy
        working-directory: ./src-tauri
        run: cargo clippy -- -D warnings
